<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Document Hub — Chi tiết Tài liệu</title>
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <header class="header">
        <a href="index.html" class="logo">
            <div class="logo-icon">📚</div><span>Document Hub</span>
        </a>
        <div class="header-spacer"></div>
        <div class="header-nav">
            <button class="btn btn-primary btn-sm" id="loginBtn" onclick="openLoginModal()">🔐 Đăng nhập</button>
            <div id="userMenu" class="hidden" style="display:flex;align-items:center;gap:10px">
                <a href="activity.html" class="btn btn-ghost btn-sm">📈</a>
                <a href="profile.html"
                    style="display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--text-primary)">
                    <div class="avatar avatar-sm" id="userAvatar">U</div>
                    <span id="userName" style="font-size:0.875rem;font-weight:500"></span>
                </a>
                <button class="btn btn-ghost btn-sm" onclick="logout()">Đăng xuất</button>
            </div>
        </div>
    </header>

    <div style="padding-top:var(--header-height)">
        <div class="full-content" id="mainContent">
            <div style="text-align:center;padding:80px">
                <div class="spinner" style="width:40px;height:40px;margin:0 auto 16px"></div>
                <p>Đang tải...</p>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/tracker.js"></script>
    <script src="js/app.js"></script>
    <script>
        const docId = new URLSearchParams(location.search).get('id');

        document.addEventListener('DOMContentLoaded', () => {
            initData(); updateHeaderUI();
            const doc = getDocument(docId);
            if (!doc) { document.getElementById('mainContent').innerHTML = `<div class="empty-state"><div class="empty-icon">❌</div><h3>Không tìm thấy tài liệu</h3><a href="index.html" class="btn btn-primary mt-md">← Quay lại thư viện</a></div>`; return; }
            renderDetail(doc);
            trackEvent('doc_detail_view', docId);
        });

        function renderDetail(doc) {
            const related = getRelatedDocuments(docId);
            const icon = FILE_ICONS[doc.file_type] || '📄';
            const gradients = { 'PDF': 'rgba(239,68,68,0.1)', 'DOCX': 'rgba(79,142,247,0.1)', 'XLSX': 'rgba(16,185,129,0.1)', 'PPT': 'rgba(245,158,11,0.1)' };
            const el = document.getElementById('mainContent');

            el.innerHTML = `
    <div class="breadcrumb">
      <a href="index.html">🏠 Thư viện</a>
      <span class="breadcrumb-sep">›</span>
      <span class="badge badge-primary">${doc.category}</span>
      <span class="breadcrumb-sep">›</span>
      <span class="current">${doc.title}</span>
    </div>

    <div style="display:grid;grid-template-columns:1fr 340px;gap:32px;align-items:start" class="detail-grid">
      <!-- LEFT COLUMN -->
      <div>
        <div style="background:linear-gradient(135deg,${gradients[doc.file_type] || 'rgba(79,142,247,0.1)'},rgba(124,58,237,0.05));border:1px solid var(--border);border-radius:var(--radius-xl);padding:32px;margin-bottom:24px;display:flex;gap:24px;align-items:flex-start">
          <div style="font-size:4rem;flex-shrink:0">${icon}</div>
          <div style="flex:1">
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
              <span class="badge badge-muted">${doc.file_type}</span>
              <span class="badge ${AccessClass[doc.access_mode] || 'badge-muted'}">${AccessLabel[doc.access_mode] || doc.access_mode}</span>
              <span class="badge badge-accent">v${doc.version}</span>
            </div>
            <h1 style="font-family:'Outfit',sans-serif;font-size:1.6rem;font-weight:800;line-height:1.3;margin-bottom:12px">${doc.title}</h1>
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
              <span class="badge badge-primary">📂 ${doc.category}</span>
              <span class="badge badge-accent">🏷 ${doc.topic}</span>
              <span class="badge badge-muted">📊 ${doc.level}</span>
              <span class="badge badge-muted">🏭 ${doc.industry}</span>
            </div>
            <div style="display:flex;gap:24px;font-size:0.85rem;color:var(--text-muted)">
              <span>👁 ${formatNum(doc.view_count)} lượt xem</span>
              <span>⬇️ ${formatNum(doc.download_count)} lượt tải</span>
              <span>📄 ${doc.pages} trang</span>
              <span>💾 ${doc.size}</span>
              <span>🗓 Cập nhật ${formatDate(doc.updated_at)}</span>
            </div>
          </div>
        </div>

        <div class="card mb-lg">
          <div class="section-title">Mô tả</div>
          <p style="color:var(--text-secondary);line-height:1.8">${doc.description}</p>
        </div>

        <div class="card mb-lg">
          <div class="section-title">Tags</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            ${doc.tags.map(t => `<span class="badge badge-muted">#${t}</span>`).join('')}
          </div>
        </div>

        ${related.length ? `
        <div>
          <div class="section-title">Tài liệu liên quan</div>
          <div class="doc-grid" style="grid-template-columns:repeat(auto-fill,minmax(240px,1fr))">
            ${related.map(d => renderDocCard(d)).join('')}
          </div>
        </div>` : ''}
      </div>

      <!-- RIGHT COLUMN (CTA) -->
      <div style="position:sticky;top:80px">
        <div class="card" style="border:1px solid var(--border-hover)">
          <div class="section-title">Truy cập tài liệu</div>

          ${doc.access_mode !== 'VIEW_ONLY' ? `
          <button class="btn btn-outline w-full mb-sm" onclick="goPreview()">
            👁 Xem trước 30%
          </button>` : ''}

          <button class="btn btn-primary w-full mb-sm" id="btnViewFull" onclick="goViewFull()">
            📖 Xem toàn bộ
          </button>

          ${doc.access_mode === 'DOWNLOAD_ALLOWED' ? `
          <button class="btn btn-accent w-full" id="btnDownload" onclick="handleDownload()">
            ⬇️ Tải về (${doc.file_type})
          </button>` : `
          <div style="background:rgba(79,142,247,0.06);border:1px dashed var(--border);border-radius:var(--radius-md);padding:12px;text-align:center;margin-top:8px">
            <p style="font-size:0.8rem;color:var(--text-muted)">📌 Tài liệu này chỉ hỗ trợ xem online</p>
          </div>`}

          <div class="divider"></div>
          <div style="font-size:0.8rem;color:var(--text-muted);display:flex;flex-direction:column;gap:8px">
            <div style="display:flex;justify-content:space-between"><span>Định dạng</span><strong style="color:var(--text-primary)">${doc.file_type}</strong></div>
            <div style="display:flex;justify-content:space-between"><span>Kích thước</span><strong style="color:var(--text-primary)">${doc.size}</strong></div>
            <div style="display:flex;justify-content:space-between"><span>Số trang</span><strong style="color:var(--text-primary)">${doc.pages}</strong></div>
            <div style="display:flex;justify-content:space-between"><span>Phiên bản</span><strong style="color:var(--text-primary)">v${doc.version}</strong></div>
          </div>
        </div>

        <div class="card mt-md" style="text-align:center;padding:20px">
          <div style="font-size:2rem;margin-bottom:8px">🔒</div>
          <p style="font-size:0.8rem;color:var(--text-muted)">Nội dung được bảo vệ. Đăng nhập để truy cập đầy đủ.</p>
        </div>
      </div>
    </div>

    <style>
    @media(max-width:900px){ .detail-grid{grid-template-columns:1fr !important} }
    </style>
  `;
        }

        function goPreview() {
            location.href = `preview.html?id=${docId}`;
        }
        function goViewFull() {
            if (!isLoggedIn()) { openLoginModal(`viewer.html?id=${docId}`); return; }
            location.href = `viewer.html?id=${docId}`;
        }
        function handleDownload() {
            if (!isLoggedIn()) { openLoginModal(); return; }
            const btn = document.getElementById('btnDownload');
            btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Đang chuẩn bị...';
            requestDownload(docId);
            showToast('success', 'Đang tải về...', 'Link tải của bạn đã được tạo (Demo mode)');
            setTimeout(() => { btn.disabled = false; btn.innerHTML = `⬇️ Tải về`; }, 2000);
        }
    </script>
</body>

</html>
