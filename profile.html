<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Document Hub — Hồ sơ cá nhân</title>
  <link rel="stylesheet" href="css/index.css">
</head>

<body>
  <header class="header">
    <a href="index.html" class="logo">
      <div class="logo-icon">📚</div><span>Document Hub</span>
    </a>
    <div class="header-spacer"></div>
    <div class="header-nav">
      <a href="index.html" class="btn btn-ghost btn-sm">📚 Thư viện</a>
      <a href="activity.html" class="btn btn-ghost btn-sm">📈 Hoạt động</a>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Đăng xuất</button>
    </div>
  </header>
  <div style="padding-top:var(--header-height)">
    <div class="full-content" style="max-width:900px" id="mainContent">
      <div style="text-align:center;padding:80px">
        <div class="spinner" style="width:40px;height:40px;margin:0 auto 16px"></div>
      </div>
    </div>
  </div>
  <div id="toastContainer" class="toast-container"></div>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/tracker.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initData();
      if (!isLoggedIn()) { openLoginModal(); document.getElementById('mainContent').innerHTML = '<div class="empty-state"><div class="empty-icon">🔐</div><h3>Vui lòng đăng nhập</h3></div>'; return; }
      renderProfile();
    });

    function renderProfile() {
      const user = getCurrentUser();
      if (!user) return;
      const scorePercent = Math.min(user.lead_score * 2, 100);
      const stageCls = { Hot: 'badge-hot', Warm: 'badge-warm', Cold: 'badge-cold' }[user.lead_stage] || 'badge-muted';
      document.getElementById('mainContent').innerHTML = `
    <h1 class="page-title">👤 Hồ sơ cá nhân</h1>
    <p class="page-sub">Quản lý thông tin và xem phân tích hành vi của bạn</p>

    <!-- Profile Card -->
    <div class="profile-header mb-lg">
      <div class="avatar" style="width:80px;height:80px;font-size:2rem">${user.name.charAt(0)}</div>
      <div style="flex:1">
        <h2 style="font-size:1.4rem;font-weight:700;margin-bottom:4px">${user.name}</h2>
        <p style="color:var(--text-muted);font-size:0.9rem">${user.email} · ${user.position || '—'}</p>
        <p style="color:var(--text-muted);font-size:0.8rem;margin-top:4px">Thành viên từ ${formatDate(user.created_at)}</p>
      </div>
      <div style="text-align:center;flex-shrink:0">
        <span class="badge ${stageCls}" style="font-size:0.9rem;padding:6px 16px">${user.lead_stage} Lead</span>
        <div style="margin-top:12px">
          <div style="font-size:1.8rem;font-weight:800;color:var(--color-primary)">${user.lead_score}</div>
          <div style="font-size:0.75rem;color:var(--text-muted)">Lead Score</div>
        </div>
        <div class="score-bar" style="width:120px;margin-top:8px"><div class="score-fill" style="width:${scorePercent}%"></div></div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px" class="profile-grid">
      <!-- Edit Form -->
      <div class="card">
        <div class="section-title">✏️ Cập nhật thông tin</div>
        <form onsubmit="handleSave(event)" style="display:flex;flex-direction:column;gap:14px;margin-top:16px">
          <div class="form-group">
            <label class="form-label">Họ và tên</label>
            <input id="p_name" class="form-input" value="${user.name}">
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" value="${user.email}" readonly style="opacity:0.6;cursor:not-allowed">
          </div>
          <div class="form-group">
            <label class="form-label">Số điện thoại</label>
            <input id="p_phone" class="form-input" value="${user.phone || ''}">
          </div>
          <div class="form-group">
            <label class="form-label">Chức vụ</label>
            <input id="p_position" class="form-input" value="${user.position || ''}">
          </div>
          <div class="form-group">
            <label class="form-label">Ngành nghề</label>
            <select id="p_industry" class="form-select">
              ${['Tài chính', 'Công nghệ', 'Bán lẻ', 'Sản xuất', 'Giáo dục', 'Y tế', 'Đa ngành'].map(i => `<option ${user.industry === i ? 'selected' : ''}>${i}</option>`).join('')}
            </select>
          </div>
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer">
            <label class="toggle"><input type="checkbox" id="p_consent" ${user.consent_email ? 'checked' : ''}><span class="toggle-slider"></span></label>
            <span style="font-size:0.875rem;color:var(--text-secondary)">Nhận email gợi ý tài liệu</span>
          </label>
          <button type="submit" class="btn btn-primary">💾 Lưu thay đổi</button>
        </form>
      </div>

      <!-- Analytics -->
      <div style="display:flex;flex-direction:column;gap:16px">
        <div class="card">
          <div class="section-title">📊 Tags nhu cầu của bạn</div>
          <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:12px">
            ${user.tags && user.tags.length ? user.tags.map(t => `<span class="badge badge-accent">🏷 ${t}</span>`).join('') : '<p style="color:var(--text-muted);font-size:0.85rem">Chưa có tag — hãy đọc thêm tài liệu để hệ thống phân tích nhu cầu của bạn</p>'}
          </div>
        </div>

        <div class="card">
          <div class="section-title">🎯 Phân tích Lead</div>
          <div style="display:flex;flex-direction:column;gap:14px;margin-top:12px">
            <div>
              <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:0.85rem">
                <span style="color:var(--text-muted)">Lead Score</span>
                <strong style="color:var(--color-primary)">${user.lead_score} / 200</strong>
              </div>
              <div class="score-bar"><div class="score-fill" style="width:${scorePercent}%"></div></div>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:0.85rem;padding:10px;background:rgba(255,255,255,0.04);border-radius:var(--radius-sm)">
              <span style="color:var(--text-muted)">Giai đoạn</span>
              <span class="badge ${stageCls}">${user.lead_stage}</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:0.85rem;padding:10px;background:rgba(255,255,255,0.04);border-radius:var(--radius-sm)">
              <span style="color:var(--text-muted)">Cập nhật lần cuối</span>
              <span style="color:var(--text-secondary)">${formatDate(user.last_active)}</span>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="section-title">📈 Cách tính điểm</div>
          <div style="font-size:0.8rem;color:var(--text-muted);display:flex;flex-direction:column;gap:6px;margin-top:8px">
            <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border-glass)"><span>Xem chi tiết tài liệu</span><span class="badge badge-muted">+1 điểm</span></div>
            <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border-glass)"><span>Preview tài liệu</span><span class="badge badge-muted">+2 điểm</span></div>
            <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border-glass)"><span>Đọc ≥60 giây</span><span class="badge badge-success">+5 điểm</span></div>
            <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border-glass)"><span>Đọc ≥3 phút</span><span class="badge badge-primary">+10 điểm</span></div>
            <div style="display:flex;justify-content:space-between;padding:6px 0"><span>Tải về tài liệu</span><span class="badge badge-accent">+20 điểm</span></div>
          </div>
        </div>

        <a href="activity.html" class="btn btn-ghost w-full">📋 Xem lịch sử hoạt động →</a>
      </div>
    </div>

    <!-- PURCHASED DOCUMENTS -->
    <div class="card mt-lg" style="margin-top:32px">
      <div class="section-title">📦 Tài liệu đã mua</div>
      <div id="purchasedList"></div>
    </div>

    <style>@media(max-width:768px){.profile-grid{grid-template-columns:1fr !important}}</style>
  `;
      // Render purchased docs
      const orders = getUserOrders(user.user_id).filter(o => o.status === 'PAID');
      const container = document.getElementById('purchasedList');
      if (!orders.length) {
        container.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;padding:16px 0">Chưa có tài liệu nào được mua. <a href="index.html" style="color:var(--color-primary)">Khám phá thư viện →</a></p>';
        return;
      }
      container.innerHTML = orders.map(o => {
        const doc = getDocument(o.doc_id);
        if (!doc) return '';
        const icon = FILE_ICONS[doc.file_type] || '📄';
        return `<div style="display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border-glass)">
                    <span style="font-size:1.8rem;flex-shrink:0">${icon}</span>
                    <div style="flex:1;min-width:0">
                        <div style="font-weight:600;font-size:0.875rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${doc.title}</div>
                        <div style="font-size:0.75rem;color:var(--text-muted);margin-top:3px">${doc.category} · ${formatDate(o.created_at)} · ${formatPrice(o.amount)}</div>
                    </div>
                    <div style="display:flex;gap:8px;flex-shrink:0">
                        <a href="document.html?id=${doc.doc_id}" class="btn btn-sm btn-ghost">👁 Xem</a>
                        <button class="btn btn-sm btn-accent" onclick="downloadPurchased('${doc.doc_id}')">⬇️ Tải</button>
                    </div>
                </div>`;
      }).join('');
    }

    function handleSave(e) {
      e.preventDefault();
      const user = getCurrentUser(); if (!user) return;
      const updates = {
        name: document.getElementById('p_name').value,
        phone: document.getElementById('p_phone').value,
        position: document.getElementById('p_position').value,
        industry: document.getElementById('p_industry').value,
        consent_email: document.getElementById('p_consent').checked
      };
      updateUserProfile(user.user_id, updates);
      showToast('success', 'Đã lưu', 'Thông tin hồ sơ đã được cập nhật');
      setTimeout(renderProfile, 300);
    }
    function downloadPurchased(docId) {
      requestDownload(docId);
      showToast('success', 'Đang tải về...', 'File đã sẵn sàng (Demo mode)');
    }
  </script>
</body>

</html>
