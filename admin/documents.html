<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Document Hub — Quản lý Tài liệu</title>
    <link rel="stylesheet" href="../css/index.css">
</head>

<body>
    <header class="header">
        <a href="../index.html" class="logo">
            <div class="logo-icon">📚</div><span>Document Hub <span
                    style="font-size:0.75rem;color:var(--color-warning);margin-left:4px">Admin</span></span>
        </a>
        <div class="header-spacer"></div>
        <div class="header-nav">
            <a href="../index.html" class="btn btn-ghost btn-sm" target="_blank">🔗 Xem Site</a>
            <div class="avatar avatar-sm" style="background:var(--grad-primary)">A</div>
        </div>
    </header>
    <div class="admin-layout">
        <nav class="admin-sidebar">
            <div class="admin-nav-label">Menu</div>
            <a href="index.html" class="admin-nav-item">📊 Dashboard</a>
            <a href="documents.html" class="admin-nav-item active">📄 Tài liệu</a>
            <a href="users.html" class="admin-nav-item">👥 Người dùng</a>
            <a href="finance.html" class="admin-nav-item">💰 Tài chính</a>
            <div class="admin-nav-divider"></div>
            <a href="../index.html" class="admin-nav-item">⬅️ Thoát Admin</a>
        </nav>
        <main class="admin-content">
            <div
                style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;gap:12px">
                <div>
                    <h1 class="page-title">📄 Quản lý Tài liệu</h1>
                    <p class="page-sub" style="margin:0">Upload, chỉnh sửa và quản lý trạng thái tài liệu</p>
                </div>
                <a href="editor.html" class="btn btn-primary">+ Thêm tài liệu</a>
            </div>

            <!-- Filters -->
            <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap">
                <div class="search-wrapper" style="flex:1;min-width:200px"><span class="search-icon">🔍</span><input
                        class="search-input" id="docSearch" placeholder="Tìm tài liệu..." oninput="renderTable()"></div>
                <select class="form-select" id="statusFilter" style="width:auto" onchange="renderTable()">
                    <option value="">Tất cả trạng thái</option>
                    <option value="PUBLISHED">Đã đăng</option>
                    <option value="DRAFT">Nháp</option>
                    <option value="ARCHIVED">Đã ẩn</option>
                </select>
                <select class="form-select" id="catFilter" style="width:auto" onchange="renderTable()">
                    <option value="">Tất cả danh mục</option>
                    ${['Kinh doanh','Marketing','Tài chính','Nhân sự','Công nghệ','Pháp lý','Vận hành'].map(c=>`<option>
                        ${c}</option>`).join('')}
                </select>
            </div>

            <!-- Table -->
            <div class="card" style="padding:0;overflow:hidden">
                <table class="data-table" id="docTable">
                    <thead>
                        <tr>
                            <th>Tài liệu</th>
                            <th>Danh mục</th>
                            <th>Giá bán</th>
                            <th>Quyền truy cập</th>
                            <th>Trạng thái</th>
                            <th>Lượt xem</th>
                            <th>Lượt tải</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="docTbody"></tbody>
                </table>
            </div>
            <p style="font-size:0.8rem;color:var(--text-muted);margin-top:12px" id="countLabel"></p>

            <!-- Add Modal đã bị xoá vì đã dùng editor.html -->
        </main>
    </div>
    <div id="toastContainer" class="toast-container"></div>
    <script src="../js/data.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/tracker.js"></script>
    <script src="../js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => { initData(); renderTable(); });

        function renderTable() {
            const q = document.getElementById('docSearch').value.toLowerCase();
            const st = document.getElementById('statusFilter').value;
            const cat = document.getElementById('catFilter').value;
            let docs = getAllDocuments();
            if (q) docs = docs.filter(d => d.title.toLowerCase().includes(q) || d.description.toLowerCase().includes(q));
            if (st) docs = docs.filter(d => d.status === st);
            if (cat) docs = docs.filter(d => d.category === cat);
            const statusBadge = { PUBLISHED: 'badge-success', DRAFT: 'badge-warning', ARCHIVED: 'badge-muted' };
            const statusLabel = { PUBLISHED: 'Đã đăng', DRAFT: 'Nháp', ARCHIVED: 'Đã ẩn' };
            document.getElementById('docTbody').innerHTML = docs.map(d => `
    <tr>
      <td>
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:1.4rem">${FILE_ICONS[d.file_type] || '📄'}</span>
          <div>
            <div style="font-size:0.875rem;font-weight:600">${d.title}</div>
            <div style="font-size:0.75rem;color:var(--text-muted)">${d.topic} · v${d.version}</div>
          </div>
        </div>
      </td>
      <td><span class="badge badge-primary">${d.category}</span></td>
      <td style="font-size:0.82rem">${d.is_paid ? `<span style="color:#f59e0b;font-weight:700">${formatPrice(d.discount_price||d.price)}</span>` : '<span style="color:#10b981">Miễn phí</span>'}</td>
      <td><span class="badge ${AccessClass[d.access_mode] || ''}">${AccessLabel[d.access_mode] || d.access_mode}</span></td>
      <td><span class="badge ${statusBadge[d.status] || 'badge-muted'}">${statusLabel[d.status] || d.status}</span></td>
      <td style="font-size:0.875rem">${formatNum(d.view_count)}</td>
      <td style="font-size:0.875rem">${formatNum(d.download_count)}</td>
      <td>
        <div class="actions">
          ${d.status === 'PUBLISHED'
                    ? `<button class="btn btn-sm btn-ghost" onclick="toggleStatus('${d.doc_id}','ARCHIVED')">🙈 Ẩn</button>`
                    : `<button class="btn btn-sm btn-success" onclick="toggleStatus('${d.doc_id}','PUBLISHED')">✅ Đăng</button>`}
          <a href="../document.html?id=${d.doc_id}" class="btn btn-sm btn-ghost" target="_blank" title="Xem">👁</a>
          <button class="btn btn-sm btn-ghost" onclick="copyShareLink('${d.doc_id}')" title="Chia sẻ liên kết chỉ đọc">🔗</button>
        </div>
      </td>
    </tr>`).join('');
            document.getElementById('countLabel').textContent = `Hiển thị ${docs.length} tài liệu`;
        }

        function toggleStatus(docId, newStatus) {
            const docs = getAllDocuments(); const d = docs.find(x => x.doc_id === docId);
            if (d) { d.status = newStatus; saveDocuments(docs); }
            renderTable(); showToast('success', 'Đã cập nhật', `Tài liệu đã ${newStatus === 'PUBLISHED' ? 'được đăng' : 'bị ẩn'}`);
        }

        function copyShareLink(docId) {
            const baseUrl = window.location.origin + window.location.pathname.replace('/admin/documents.html', '');
            const shareUrl = `${baseUrl}/landing.html?id=${docId}`;
            
            navigator.clipboard.writeText(shareUrl).then(() => {
                showToast('success', 'Đã copy', 'Đã lưu đường dẫn chia sẻ vào bộ nhớ tạm');
            }).catch(err => {
                showToast('error', 'Lỗi copy', 'Không thể copy đường dẫn. Vui lòng thử lại');
                console.error('Lỗi khi copy link:', err);
            });
        }
    </script>
</body>

</html>
